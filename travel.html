<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel – Clemens JS Schaefer</title>
  <link rel="stylesheet" href="style.css?v=1" />
  <style>
    .map-wrap {
      margin-top: 32px;
      position: relative;
      width: 100vw;
      left: 50%;
      right: 50%;
      margin-left: -50vw;
      margin-right: -50vw;
      background: #ffffff;
      border-top: 1px solid #f1f1ef;
      border-bottom: 1px solid #f1f1ef;
      padding: 12px 0;
    }
    .map-container {
      width: 100%;
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 24px;
      box-sizing: border-box;
      position: relative;
    }
    /* Responsive fluid horizontal breakout world vector map display canvas */
    .map-container svg {
      width: 100%;
      height: auto;
      display: block;
      background: #ffffff;
    }

    .map-tooltip {
      position: fixed;
      pointer-events: none;
      background: #37352f;
      color: #fff;
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.1s ease;
      z-index: 50;
      white-space: nowrap;
    }
    .map-tooltip.toggle_visible { opacity: 1; }
    .map-tooltip.visible { opacity: 1; }

    .travel-stat {
      margin-top: 32px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .travel-stat .num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.5rem;
      font-weight: 500;
      line-height: 1;
      color: #37352f;
    }
    .travel-stat .label {
      font-size: 0.8125rem;
      color: #b4b4b0;
    }

    .country-section { margin-top: 40px; }
    .country-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    .country-grid span {
      font-size: 0.875rem;
      color: #55534e;
      padding: 6px 0;
      border-bottom: 1px solid #f1f1ef;
    }
    .country-grid span:nth-child(odd) { padding-right: 12px; }
    .country-grid span:nth-child(even) { padding-left: 12px; }
    .country-grid span:hover { color: #37352f; }
  </style>
</head>
<body>
  <script src="nav.js"></script>

  <h1>Travel</h1>

  <!-- Expansive responsive edge-to-edge widescreen banner panel display container layout -->
  <div class="map-wrap">
    <div class="map-container" id="map"></div>
    <div class="map-tooltip" id="tooltip"></div>
  </div>

  <!-- Countries Widget Badges Widget widgets metrics flat columns rows links -->
  <div class="travel-stat" id="stat"></div>
  <section class="country-section" style="margin-top: 20px;">
    <div class="country-grid" id="countries"></div>
  </section>

  <!-- US States Widget Badges Widget widgets metrics flat columns rows links -->
  <div class="travel-stat" id="us-stat" style="margin-top: 32px;"></div>
  <section class="country-section" style="margin-top: 20px;">
    <div class="country-grid" id="states-list"></div>
  </section>

  <script>
    // Global unified travel checklist metrics database array logs parameters history
    const visited = [
      { name: 'Germany', code: 'de', year: 1994 },
      { name: 'Iceland', code: 'is', year: 2007 },
      { name: 'Austria', code: 'at', year: 2008 },
      { name: 'Ireland', code: 'ie', year: 2010 },
      { name: 'Norway', code: 'no', year: 2009 },
      { name: 'Denmark', code: 'dk', year: 2024 },
      { name: 'Italy', code: 'it', year: 2016 },
      { name: 'Peru', code: 'pe', year: 2011 },
      { name: 'Colombia', code: 'co', year: 2016 },
      { name: 'Ecuador', code: 'ec', year: 2016 },
      { name: 'Panama', code: 'pa', year: 2017 },
      { name: 'Costa Rica', code: 'cr', year: 2014 },
      { name: 'India', code: 'in', year: 2014 },
      { name: 'Israel', code: 'il', year: 2013 },
      { name: 'France', code: 'fr', year: 2006 },
      { name: 'Spain', code: 'es', year: 2013 },
      { name: 'Cyprus', code: 'cy', year: 2012 },
      { name: 'United Kingdom', code: 'gb', year: 2012 },
      { name: 'China', code: 'cn', year: 2026 },
      { name: 'Japan', code: 'jp', year: 2026 },
      { name: 'Poland', code: 'pl', year: 2009 },
      { name: 'Czech Republic', code: 'cz', year: 2012 },
      { name: 'Mexico', code: 'mx', year: 2025 },
      { name: 'United States', code: 'us', year: 2016 },
      { name: 'Liechtenstein', code: 'li', year: 2013 },
      { name: 'Switzerland', code: 'ch', year: 2013 },
      { name: 'Netherlands', code: 'nl', year: 2017 },
      { name: 'Portugal', code: 'pt', year: 2019 },
      { name: 'Croatia', code: 'hr', year: 2011 },
      { name: 'Puerto Rico', code: 'pr', year: 2022 }
    ];

    // Visited United States domestic subdivisions states logs parameters records metrics
    const visitedStates = [
      { name: 'Florida', code: 'fl', year: 2016 },
      { name: 'Illinois', code: 'il', year: 2018 },
      { name: 'Indiana', code: 'in', year: 2018 },
      { name: 'Michigan', code: 'mi', year: 2018 },
      { name: 'Ohio', code: 'oh', year: 2020 },
      { name: 'New York', code: 'ny', year: 2020 },
      { name: 'California', code: 'ca', year: 2022 },
      { name: 'Nevada', code: 'nv', year: 2022 },
      { name: 'Utah', code: 'ut', year: 2022 },
      { name: 'Arizona', code: 'az', year: 2022 },
      { name: 'Wyoming', code: 'wy', year: 2022 },
      { name: 'Colorado', code: 'co', year: 2022 },
      { name: 'Nebraska', code: 'ne', year: 2022 },
      { name: 'Iowa', code: 'ia', year: 2022 },
      { name: 'Texas', code: 'tx', year: 2023 },
      { name: 'Hawaii', code: 'hi', year: 2024 }
    ];

    // Alphabetical configuration sorts metrics list layout matching templates preference
    visited.sort((a, b) => a.name.localeCompare(b.name));
    visitedStates.sort((a, b) => a.name.localeCompare(b.name));

    // Populate widgets statistics counter badges text elements 
    document.getElementById('stat').innerHTML =
      `<span class="num">${visited.length}</span><span class="label">countries visited</span>`;
    document.getElementById('us-stat').innerHTML =
      `<span class="num">${visitedStates.length}</span><span class="label">US states visited</span>`;

    // Populate text checklist items columns flat sheets rows spans 
    document.getElementById('countries').innerHTML = visited
      .map(c => `<span>${c.name} (${c.year})</span>`).join('');
    document.getElementById('states-list').innerHTML = visitedStates
      .map(s => `<span>${s.name} (${s.year})</span>`).join('');

    const mapContainer = document.getElementById('map');

    // Trigger fresh query cache-busted version parameters request download loaders onto uniquely named asset path route
    fetch('world-map-subdivisions-v1.svg?v=' + new Date().getTime())
      .then(r => r.text())
      .then(svg => {
        mapContainer.innerHTML = svg;
        const tip = document.getElementById('tooltip');
        
        const svgEl = mapContainer.querySelector('svg');
        if (svgEl) {
          // Purge fixed vector size limitations cleanly from object tags trees structures reference
          svgEl.removeAttribute('width');
          svgEl.removeAttribute('height');
          svgEl.removeAttribute('fill');
          
          // DEFINITIVE HEADROOM VIEWBOX OVERRIDE BOUNDING BOX: Vertical view coordinates span parameter 
          // explicitly scaled to 1220 coordinate height range limits to guarantee South America displays completely uncropped, 
          // expanded, sprawling and prominent wide, while cutting off Antarctica clean below the bottom frames limits!
          svgEl.setAttribute('viewBox', '140 40 2410 1220');
          svgEl.setAttribute('preserveAspectRatio', 'xMidYMid slice');
          
          // Inject dominant style sheets rules text strings flattening pre existing file details defaults properties
          let embeddedStyle = svgEl.querySelector('#style_css_sheet') || svgEl.querySelector('style');
          if (!embeddedStyle) {
            embeddedStyle = document.createElementNS("http://www.w3.org/2000/svg", "style");
            embeddedStyle.id = "style_css_sheet";
            svgEl.insertBefore(embeddedStyle, svgEl.firstChild);
          }
          
          embeddedStyle.textContent = `
            /* Pristine uniform default soft off-white light gray fill background and solid distinct white borders lines contours separations universally */
            path, polygon, circle {
              fill: #f4f4f2 !important;
              stroke: #ffffff !important;
              stroke-width: 0.6px !important;
            }
            /* Sea transparent backfill spec adjustments layout parameter matches styles definitions rules */
            .oceanxx, #ocean, rect[fill="#ffffff"] {
              fill: #ffffff !important;
              stroke: none !important;
            }
            /* Drop matching floating metadata circle bubbles indicators layers placeholders completely */
            .circlexx, .subxx, .unxx, .noxx {
              display: none !important;
              opacity: 0 !important;
            }
            /* High legibility dark charcoal highlights cover color shading fill property string and sharp white borders contours lines splits features profiles */
            .visited, path.visited, polygon.visited {
              fill: #37352f !important;
              stroke: #ffffff !important;
              stroke-width: 0.8px !important;
            }
            
            /* ULTIMATE DATA-ID SELECTOR SHADING override MATRIX: Because this high resolution subdivisions 
               SVG map structures individual sub national sub states outlines via custom dataset tags properties 
               attributes (e.g. data-id="CA"), this direct text rules attribute selector mapping array forces 
               immediate, native visual coloringVis dominance across both uppercase and lowercase tokens natively! */
            [data-id="FL"], [data-id="fl"], [data-id="IL"], [data-id="il"], [data-id="IN"], [data-id="in"], [data-id="MI"], [data-id="mi"], [data-id="OH"], [data-id="oh"], [data-id="NY"], [data-id="ny"], [data-id="CA"], [data-id="ca"], [data-id="NV"], [data-id="nv"], [data-id="UT"], [data-id="ut"], [data-id="AZ"], [data-id="az"], [data-id="WY"], [data-id="wy"], [data-id="CO"], [data-id="co"], [data-id="NE"], [data-id="ne"], [data-id="IA"], [data-id="ia"], [data-id="TX"], [data-id="tx"], [data-id="HI"], [data-id="hi"] {
              fill: #37352f !important;
              stroke: #ffffff !important;
              stroke-width: 0.8px !important;
            }
            
            /* Slice off polar limits mass out entirely from view path display */
            #AQ, .aq, [id="us-aq"], [id="aq"] {
              display: none !important;
              opacity: 0 !important;
            }
          `;
        }

        // 1. Color Visited International Countries (strictly bypassing parent USA collective group nodes matches loops tracks checklist definitions strings)
        visited.forEach(({ code, name }) => {
          const cleanCode = code.toLowerCase().trim();
          if (cleanCode === 'us' || cleanCode === 'usa') return;
          
          const elements = mapContainer.querySelectorAll(`#${cleanCode}, .${cleanCode}`);
          elements.forEach(el => {
            if (el.tagName === 'g') {
              el.querySelectorAll('path, polygon').forEach(p => {
                p.classList.add('visited');
                p.style.setProperty('fill', '#37352f', 'important');
                p.dataset.label = name;
              });
            } else {
              el.classList.add('visited');
              el.style.setProperty('fill', '#37352f', 'important');
              el.dataset.label = name;
            }
          });
        });

        // 2. Color Granular Visited domestic United States subdivisions state shapes contours profiles elements beautifully inside the widescreen banner canvas
        visitedStates.forEach(({ code, name }) => {
          const cleanCode = code.toLowerCase().trim();
          const permutations = [
            `[data-id="${cleanCode.toUpperCase()}"]`,
            `[data-id="${cleanCode}"]`,
            `#us-${cleanCode}`,
            `#US-${cleanCode.toUpperCase()}`,
            `#${cleanCode}`,
            `#${cleanCode.toUpperCase()}`,
            `[id$="-${cleanCode}"]`
          ];
          
          let el = null;
          for (const selector of permutations) {
            el = mapContainer.querySelector(selector);
            if (el) break;
          }
          
          if (el) {
            el.classList.add('visited');
            el.style.setProperty('fill', '#37352f', 'important');
            el.dataset.label = `USA - ${name}`;
            
            if (el.tagName === 'g') {
              el.querySelectorAll('path, polygon').forEach(p => {
                p.classList.add('visited');
                p.style.setProperty('fill', '#37352f', 'important');
                p.dataset.label = `USA - ${name}`;
              });
            }
          }
        });

        // Unified active coordination mouse hover position indicators labels tracking tooltip listeners perfect routines loops 
        mapContainer.addEventListener('mousemove', e => {
          let target = e.target.closest('.visited');
          
          // Fallback context indicators lookup scan check mapping attributes cased codes values cleanly
          if (!target && e.target.getAttribute) {
            const dId = e.target.getAttribute('data-id');
            if (dId && visitedStates.some(s => s.code === dId.toLowerCase())) {
              target = e.target;
            }
          }

          if (target) {
            if (target.dataset.label) {
              tip.textContent = target.dataset.label;
            } else {
              const rawDId = target.getAttribute('data-id') || '';
              const matchedState = visitedStates.find(s => s.code === rawDId.toLowerCase());
              if (matchedState) {
                tip.textContent = `USA - ${matchedState.name}`;
                target.dataset.label = `USA - ${matchedState.name}`;
              }
            }
            tip.classList.add('visible');
            tip.style.left = e.clientX + 12 + 'px';
            tip.style.top = e.clientY - 28 + 'px';
          } else {
            tip.classList.remove('visible');
          }
        });

        mapContainer.addEventListener('mouseleave', () => {
          tip.classList.remove('visible');
        });
      });
  </script>
</body>
</html>
