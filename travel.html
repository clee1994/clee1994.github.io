<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel – Clemens JS Schaefer</title>
  <link rel="stylesheet" href="style.css?v=1" />
  <style>
    .map-wrap {
      margin-top: 32px;
      position: relative;
      width: 100vw;
      left: 50%;
      right: 50%;
      margin-left: -50vw;
      margin-right: -50vw;
      background: #ffffff;
      border-top: 1px solid #f1f1ef;
      border-bottom: 1px solid #f1f1ef;
      padding: 12px 0;
    }
    .map-container {
      width: 100%;
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 24px;
      box-sizing: border-box;
      position: relative;
    }
    /* Premium widescreen responsive fluid horizontal breakout travel mapping display dashboard vector canvas sizing */
    .map-container svg {
      width: 100%;
      height: auto;
      display: block;
      background: #ffffff;
    }

    .map-tooltip {
      position: fixed;
      pointer-events: none;
      background: #37352f;
      color: #fff;
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.1s ease;
      z-index: 50;
      white-space: nowrap;
    }
    .map-tooltip.visible { opacity: 1; }

    .travel-stat {
      margin-top: 32px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .travel-stat .num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.5rem;
      font-weight: 500;
      line-height: 1;
      color: #37352f;
    }
    .travel-stat .label {
      font-size: 0.8125rem;
      color: #b4b4b0;
    }

    .country-section { margin-top: 40px; }
    .country-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    .country-grid span {
      font-size: 0.875rem;
      color: #55534e;
      padding: 6px 0;
      border-bottom: 1px solid #f1f1ef;
    }
    .country-grid span:nth-child(odd) { padding-right: 12px; }
    .country-grid span:nth-child(even) { padding-left: 12px; }
    .country-grid span:hover { color: #37352f; }
  </style>
</head>
<body>
  <script src="nav.js"></script>

  <h1>Travel</h1>

  <!-- Full window horizontal layout edge to edge breakout banner wrapper canvas panel slot -->
  <div class="map-wrap">
    <div class="map-container" id="map"></div>
    <div class="map-tooltip" id="tooltip"></div>
  </div>

  <!-- Countries counters widgets list summaries flat columns cells rows nodes badges spans items -->
  <div class="travel-stat" id="stat"></div>
  <section class="country-section" style="margin-top: 20px;">
    <div class="country-grid" id="countries"></div>
  </section>

  <!-- US States counters widgets list summaries flat columns cells rows nodes badges spans items -->
  <div class="travel-stat" id="us-stat" style="margin-top: 32px;"></div>
  <section class="country-section" style="margin-top: 20px;">
    <div class="country-grid" id="states-list"></div>
  </section>

  <script>
    // Global travels log database reconciled indices dataset arrays parameters records statistics items
    const visited = [
      { name: 'Germany', code: 'de', year: 1994 },
      { name: 'Iceland', code: 'is', year: 2007 },
      { name: 'Austria', code: 'at', year: 2008 },
      { name: 'Ireland', code: 'ie', year: 2010 },
      { name: 'Norway', code: 'no', year: 2009 },
      { name: 'Denmark', code: 'dk', year: 2024 },
      { name: 'Italy', code: 'it', year: 2016 },
      { name: 'Peru', code: 'pe', year: 2011 },
      { name: 'Colombia', code: 'co', year: 2016 },
      { name: 'Ecuador', code: 'ec', year: 2016 },
      { name: 'Panama', code: 'pa', year: 2017 },
      { name: 'Costa Rica', code: 'cr', year: 2014 },
      { name: 'India', code: 'in', year: 2014 },
      { name: 'Israel', code: 'il', year: 2013 },
      { name: 'France', code: 'fr', year: 2006 },
      { name: 'Spain', code: 'es', year: 2013 },
      { name: 'Cyprus', code: 'cy', year: 2012 },
      { name: 'United Kingdom', code: 'gb', year: 2012 },
      { name: 'China', code: 'cn', year: 2026 },
      { name: 'Japan', code: 'jp', year: 2026 },
      { name: 'Poland', code: 'pl', year: 2009 },
      { name: 'Czech Republic', code: 'cz', year: 2012 },
      { name: 'Mexico', code: 'mx', year: 2025 },
      { name: 'United States', code: 'us', year: 2016 },
      { name: 'Liechtenstein', code: 'li', year: 2013 },
      { name: 'Switzerland', code: 'ch', year: 2013 },
      { name: 'Netherlands', code: 'nl', year: 2017 },
      { name: 'Portugal', code: 'pt', year: 2019 },
      { name: 'Croatia', code: 'hr', year: 2011 },
      { name: 'Puerto Rico', code: 'pr', year: 2022 }
    ];

    // Visited domestic United States subdivisions individual state names parameters logging entries records
    const visitedStates = [
      { name: 'Florida', code: 'fl', year: 2016 },
      { name: 'Illinois', code: 'il', year: 2018 },
      { name: 'Indiana', code: 'in', year: 2018 },
      { name: 'Michigan', code: 'mi', year: 2018 },
      { name: 'Ohio', code: 'oh', year: 2020 },
      { name: 'New York', code: 'ny', year: 2020 },
      { name: 'California', code: 'ca', year: 2022 },
      { name: 'Nevada', code: 'nv', year: 2022 },
      { name: 'Utah', code: 'ut', year: 2022 },
      { name: 'Arizona', code: 'az', year: 2022 },
      { name: 'Wyoming', code: 'wy', year: 2022 },
      { name: 'Colorado', code: 'co', year: 2022 },
      { name: 'Nebraska', code: 'ne', year: 2022 },
      { name: 'Iowa', code: 'ia', year: 2022 },
      { name: 'Texas', code: 'tx', year: 2023 },
      { name: 'Hawaii', code: 'hi', year: 2024 }
    ];

    // Alpha sort arrangement specifications lists layout grid components tokens panels spans text components 
    visited.sort((a, b) => a.name.localeCompare(b.name));
    visitedStates.sort((a, b) => a.name.localeCompare(b.name));

    // Populate stats counters widget components badges 
    document.getElementById('stat').innerHTML =
      `<span class="num">${visited.length}</span><span class="label">countries visited</span>`;
    document.getElementById('us-stat').innerHTML =
      `<span class="num">${visitedStates.length}</span><span class="label">US states visited</span>`;

    // Populate text rows layout components cells data fields tokens spans 
    document.getElementById('countries').innerHTML = visited
      .map(c => `<span>${c.name} (${c.year})</span>`).join('');
    document.getElementById('states-list').innerHTML = visitedStates
      .map(s => `<span>${s.name} (${s.year})</span>`).join('');

    const mapContainer = document.getElementById('map');

    // Download 1.74 MB high resolution vector map asset from cache busted uniquely routed path resource string
    fetch('world-map-subdivisions-v1.svg?v=' + new Date().getTime())
      .then(r => r.text())
      .then(svg => {
        mapContainer.innerHTML = svg;
        const tip = document.getElementById('tooltip');
        
        const svgEl = mapContainer.querySelector('svg');
        if (svgEl) {
          // Purge static intrinsic vector parameters width and height from structural tag properties nodes
          svgEl.removeAttribute('width');
          svgEl.removeAttribute('height');
          svgEl.removeAttribute('fill');
          
          // ADAPTIVE geography VERTICAL METRICS CROP VIEWBOX CONFIGURATION: 
          // Truncated perfectly at Y height span limits 1140 coordinate units to guarantee that South America prints 
          // beautifully complete, massive wide and uncropped down to its southern extremities tips, 
          // while successfully masking polar Antarctica completely away out from sight below!
          svgEl.setAttribute('viewBox', '82 45 2528 1140');
          svgEl.setAttribute('preserveAspectRatio', 'xMidYMid meet');
          
          // Injected style sheet overrides string block flattening intrinsic file definitions details properties
          let embeddedStyle = svgEl.querySelector('#style_css_sheet') || svgEl.querySelector('style');
          if (!embeddedStyle) {
            embeddedStyle = document.createElementNS("http://www.w3.org/2000/svg", "style");
            embeddedStyle.id = "style_css_sheet";
            svgEl.insertBefore(embeddedStyle, svgEl.firstChild);
          }
          
          embeddedStyle.textContent = `
            /* Pristine unvisited default off white land background and clean crisp white borders map boundaries splits universally */
            path, polygon, circle {
              fill: #f4f4f2 !important;
              stroke: #ffffff !important;
              stroke-width: 0.5px !important;
            }
            /* Sea transparent overlays filter specifications matching theme styles layout requirements */
            .oceanxx, #ocean, rect[fill="#ffffff"], rect[fill="#c2e2ff"] {
              fill: #ffffff !important;
              stroke: none !important;
            }
            /* Completely strip placeholder circle metadata tags layers vectors out from document models */
            .circlexx, .subxx, .unxx, .noxx {
              display: none !important;
              opacity: 0 !important;
            }
            /* High Legibility dark charcoal visited country highlights cover fill parameters definitions values specifications */
            .visited, path.visited, polygon.visited {
              fill: #37352f !important;
              stroke: #ffffff !important;
              stroke-width: 0.8px !important;
            }
            
            /* IRONCLAD DUAL LAYER HIGHLIGHT RULES SELECTOR MATRIX STRING: Scopes direct matches via cased class tokens 
               and traditional lowercase ID strings handles with supreme priority flag modifier properties live! */
            #us-fl, #us-il, #us-in, #us-mi, #us-oh, #us-ny, #us-ca, #us-nv, #us-ut, #us-az, #us-wy, #us-co, #us-ne, #us-ia, #us-tx, #us-hi,
            .us-fl, .us-il, .us-in, .us-mi, .us-oh, .us-ny, .us-ca, .us-nv, .us-ut, .us-az, .us-wy, .us-co, .us-ne, .us-ia, .us-tx, .us-hi,
            [class*="us-fl"], [class*="us-il"], [class*="us-in"], [class*="us-mi"], [class*="us-oh"], [class*="us-ny"], [class*="us-ca"], [class*="us-nv"], [class*="us-ut"], [class*="us-az"], [class*="us-wy"], [class*="us-co"], [class*="us-ne"], [class*="us-ia"], [class*="us-tx"], [class*="us-hi"] {
              fill: #37352f !important;
              stroke: #ffffff !important;
              stroke-width: 0.8px !important;
            }
            
            /* Mask polar limits cleanly away printed lines views */
            #AQ, .aq, [id="us-aq"], [id="aq"] {
              display: none !important;
              opacity: 0 !important;
            }
          `;
        }

        // 1. Paint Visited International Countries (strictly skipping collective parent USA country boundaries loops checking entries)
        visited.forEach(({ code, name }) => {
          const cleanCode = code.toLowerCase().trim();
          if (cleanCode === 'us' || cleanCode === 'usa') return;
          
          const elements = mapContainer.querySelectorAll(`#${cleanCode}, .${cleanCode}`);
          elements.forEach(el => {
            if (el.tagName === 'g') {
              el.querySelectorAll('path, polygon').forEach(p => {
                p.classList.add('visited');
                p.setAttribute('fill', '#37352f');
                p.style.setProperty('fill', '#37352f', 'important');
                p.dataset.label = name;
              });
            } else {
              el.classList.add('visited');
              el.setAttribute('fill', '#37352f');
              el.style.setProperty('fill', '#37352f', 'important');
              el.dataset.label = name;
            }
          });
        });

        // 2. Paint Granular Visited domestic US individual state subdivisions outline paths elements beautifully inside the canvas
        // SCOPED STYLES MATCHERS MATRIX QUERY BLOCKS: Scopes matches cleanly via prefix class query selector permutations
        visitedStates.forEach(({ code, name }) => {
          const cleanCode = code.toLowerCase().trim();
          const permutations = [
            `#us-${cleanCode}`,
            `.us-${cleanCode}`,
            `[class*="us-${cleanCode}"]`,
            `[data-id="${cleanCode.toUpperCase()}"]`,
            `[data-id="${cleanCode}"]`
          ];
          
          let el = null;
          for (const selector of permutations) {
            el = mapContainer.querySelector(selector);
            if (el) break;
          }
          
          if (el) {
            el.classList.add('visited');
            el.setAttribute('fill', '#37352f');
            el.style.setProperty('fill', '#37352f', 'important');
            el.dataset.label = `USA - ${name}`;
            
            if (el.tagName === 'g') {
              el.querySelectorAll('path, polygon').forEach(p => {
                p.classList.add('visited');
                p.setAttribute('fill', '#37352f');
                p.style.setProperty('fill', '#37352f', 'important');
                p.dataset.label = `USA - ${name}`;
              });
            }
          } else {
            const fallbackElements = mapContainer.querySelectorAll(`[class*="us-${cleanCode}"], [class*="US-${cleanCode.toUpperCase()}"]`);
            fallbackElements.forEach(fEl => {
              fEl.classList.add('visited');
              fEl.setAttribute('fill', '#37352f');
              fEl.style.setProperty('fill', '#37352f', 'important');
              fEl.dataset.label = `USA - ${name}`;
            });
          }
        });

        // 3. THE RESOLVED DEFINITIVE RECURSIVE TEXT TITLE TAG SCANNER HIGHLIGHT MATRIX PIPELINE:
        // Loops through every single path tag cell in the container tree, parses its nested text title child tag nodes, 
        // and matches its text value string directly against the full cased state human name string entry logs 
        // ('California', 'Texas', 'Florida') to apply concurrent double dominance coatings fills paints live, 
        // completely crushing any casing mismatches, ID lookup gaps, or browser engine anomalies permanently!
        visitedStates.forEach(({ name }) => {
          const allPaths = mapContainer.querySelectorAll('path, polygon');
          allPaths.forEach(p => {
            const titleNode = p.querySelector('title');
            if (titleNode && titleNode.textContent.trim().toLowerCase() === name.toLowerCase().trim()) {
              p.classList.add('visited');
              p.setAttribute('fill', '#37352f');
              p.style.setProperty('fill', '#37352f', 'important');
              p.dataset.label = `USA - ${name}`;
            }
          });
        });

        // Active pointers coordinates pops up context tooltips overlay tracking interactions text labels listeners loops
        mapContainer.addEventListener('mousemove', e => {
          let target = e.target.closest('.visited');
          
          // Fallback scanner descriptors parser checking tokens definitions mappings parameters metrics parameters fields settings
          if (!target && e.target.className && e.target.className.baseVal) {
            const cList = e.target.className.baseVal.split(' ');
            const stateClass = cList.find(c => c.startsWith('us-') && c !== 'us-');
            if (stateClass) {
              const code = stateClass.replace('us-', '');
              if (visitedStates.some(s => s.code === code)) {
                target = e.target;
              }
            }
          }
          if (!target && e.target.id) {
            const idL = e.target.id.toLowerCase();
            if (idL.startsWith('us-')) {
              const code = idL.replace('us-', '');
              if (visitedStates.some(s => s.code === code)) {
                target = e.target;
              }
            }
          }

          if (target) {
            if (target.dataset.label) {
              tip.textContent = target.dataset.label;
            } else {
              let codeStr = '';
              if (target.id) codeStr = target.id.toLowerCase().replace('us-', '');
              if (!codeStr && target.className && target.className.baseVal) {
                const stateC = target.className.baseVal.split(' ').find(c => c.startsWith('us-') && c !== 'us-');
                if (stateC) codeStr = stateC.replace('us-', '');
              }
              const matchedState = visitedStates.find(s => s.code === codeStr.toLowerCase());
              if (matchedState) {
                tip.textContent = `USA - ${matchedState.name}`;
                target.dataset.label = `USA - ${matchedState.name}`;
              }
            }
            tip.classList.add('visible');
            tip.style.left = e.clientX + 12 + 'px';
            tip.style.top = e.clientY - 28 + 'px';
          } else {
            tip.classList.remove('visible');
          }
        });

        mapContainer.addEventListener('mouseleave', () => {
          tip.classList.remove('visible');
        });
      });
  </script>
</body>
</html>
