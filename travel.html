<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel – Clemens JS Schaefer</title>
  <link rel="stylesheet" href="style.css?v=1" />
  <style>
    .map-wrap {
      margin-top: 32px;
      position: relative;
    }
    .map-container {
      width: calc(100% + 48px);
      margin-left: -24px;
      position: relative;
    }
    .map-container svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .map-container svg path,
    .map-container svg polygon {
      fill: #f1f1ef;
      stroke: #fff;
      stroke-width: 0.4;
      transition: fill 0.2s ease;
    }
    .map-container svg .visited {
      fill: #37352f;
      cursor: pointer;
    }
    .map-container svg .visited:hover {
      fill: #787774;
    }

    /* Dedicated US Map styles */
    .usa-map-wrap {
      margin-top: 24px;
      position: relative;
      border: 1px solid #f1f1ef;
      border-radius: 6px;
      padding: 12px;
      background: #fafafa;
    }
    .usa-map-container svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .usa-map-container svg path {
      fill: #e9e9e6;
      stroke: #fff;
      stroke-width: 1;
      transition: fill 0.2s ease;
    }
    .usa-map-container svg .visited {
      fill: #37352f;
      cursor: pointer;
    }
    .usa-map-container svg .visited:hover {
      fill: #787774;
    }

    .map-tooltip {
      position: fixed;
      pointer-events: none;
      background: #37352f;
      color: #fff;
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.1s ease;
      z-index: 50;
      white-space: nowrap;
    }
    .map-tooltip.visible { opacity: 1; }

    .travel-stat {
      margin-top: 32px;
      display: flex;
      align-items: baseline;
      gap: 8px;
      border-bottom: 2px solid #f1f1ef;
      padding-bottom: 6px;
    }
    .travel-stat .num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.5rem;
      font-weight: 500;
      line-height: 1;
      color: #37352f;
    }
    .travel-stat .label {
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #b4b4b0;
    }

    .country-section { margin-top: 16px; }
    .country-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    .country-grid span {
      font-size: 0.875rem;
      color: #55534e;
      padding: 6px 0;
      border-bottom: 1px solid #f1f1ef;
    }
    .country-grid span:nth-child(odd) { padding-right: 12px; }
    .country-grid span:nth-child(even) { padding-left: 12px; }
    .country-grid span:hover { color: #37352f; }
  </style>
</head>
<body>
  <script src="nav.js"></script>

  <h1>Travel</h1>

  <!-- WORLD SECTION -->
  <div class="map-wrap">
    <div class="map-container" id="world-map-slot"></div>
  </div>

  <div class="travel-stat">
    <span class="num" id="world-counter">0</span>
    <span class="label">Countries Visited</span>
  </div>
  
  <section class="country-section">
    <div class="country-grid" id="countries-grid"></div>
  </section>

  <!-- US STATES SECTION -->
  <div class="travel-stat" style="margin-top: 56px;">
    <span class="num" id="usa-counter">0</span>
    <span class="label">US States Visited</span>
  </div>

  <div class="usa-map-wrap">
    <div class="usa-map-container" id="usa-map-slot"></div>
  </div>

  <section class="country-section">
    <div class="country-grid" id="states-grid"></div>
  </section>

  <div class="map-tooltip" id="global-tooltip"></div>

  <script>
    // Reconciled True International Countries List View (Includes USA 2016 unified parent node)
    const countries = [
      { name: 'Germany', code: 'de', year: 1994 },
      { name: 'Iceland', code: 'is', year: 2007 },
      { name: 'Austria', code: 'at', year: 2008 },
      { name: 'Ireland', code: 'ie', year: 2010 },
      { name: 'Norway', code: 'no', year: 2009 },
      { name: 'Denmark', code: 'dk', year: 2024 },
      { name: 'Italy', code: 'it', year: 2016 },
      { name: 'Peru', code: 'pe', year: 2011 },
      { name: 'Colombia', code: 'co', year: 2016 },
      { name: 'Ecuador', code: 'ec', year: 2016 },
      { name: 'Panama', code: 'pa', year: 2017 },
      { name: 'Costa Rica', code: 'cr', year: 2014 },
      { name: 'India', code: 'in', year: 2014 },
      { name: 'Israel', code: 'il', year: 2013 },
      { name: 'France', code: 'fr', year: 2006 },
      { name: 'Spain', code: 'es', year: 2013 },
      { name: 'Cyprus', code: 'cy', year: 2012 },
      { name: 'United Kingdom', code: 'gb', year: 2012 },
      { name: 'China', code: 'cn', year: 2026 },
      { name: 'Japan', code: 'jp', year: 2026 },
      { name: 'Poland', code: 'pl', year: 2009 },
      { name: 'Czech Republic', code: 'cz', year: 2012 },
      { name: 'Mexico', code: 'mx', year: 2025 },
      { name: 'United States', code: 'us', year: 2016 },
      { name: 'Liechtenstein', code: 'li', year: 2013 },
      { name: 'Switzerland', code: 'ch', year: 2013 },
      { name: 'Netherlands', code: 'nl', year: 2017 },
      { name: 'Portugal', code: 'pt', year: 2019 },
      { name: 'Croatia', code: 'hr', year: 2011 },
      { name: 'Puerto Rico', code: 'pr', year: 2022 }
    ];

    // Granular Breakdown dataset logging explicit US domestic sub states visits
    const states = [
      { name: 'Florida', code: 'fl', year: 2016 },
      { name: 'Illinois', code: 'il', year: 2018 },
      { name: 'Indiana', code: 'in', year: 2018 },
      { name: 'Michigan', code: 'mi', year: 2018 },
      { name: 'Ohio', code: 'oh', year: 2020 },
      { name: 'New York', code: 'ny', year: 2020 },
      { name: 'California', code: 'ca', year: 2022 },
      { name: 'Nevada', code: 'nv', year: 2022 },
      { name: 'Utah', code: 'ut', year: 2022 },
      { name: 'Arizona', code: 'az', year: 2022 },
      { name: 'Wyoming', code: 'wy', year: 2022 },
      { name: 'Colorado', code: 'co', year: 2022 },
      { name: 'Nebraska', code: 'ne', year: 2022 },
      { name: 'Iowa', code: 'ia', year: 2022 },
      { name: 'Texas', code: 'tx', year: 2023 },
      { name: 'Hawaii', code: 'hi', year: 2024 }
    ];

    // Alphabetize lists for clean tabular grid displays panel output 
    countries.sort((a, b) => a.name.localeCompare(b.name));
    states.sort((a, b) => a.name.localeCompare(b.name));

    // Update Counters Text elements
    document.getElementById('world-counter').textContent = countries.length;
    document.getElementById('usa-counter').textContent = states.length;

    // Populate Layout Grid cells 
    document.getElementById('countries-grid').innerHTML = countries
      .map(c => `<span>${c.name} (${c.year})</span>`).join('');
    document.getElementById('states-grid').innerHTML = states
      .map(s => `<span>${s.name} (${s.year})</span>`).join('');

    const tooltip = document.getElementById('global-tooltip');

    // ROUTINE 1: Initialize and Render Interactive World Map Graphic
    const worldSlot = document.getElementById('world-map-slot');
    fetch('world-map.svg')
      .then(r => r.text())
      .then(svg => {
        worldSlot.innerHTML = svg;
        
        countries.forEach(({ code, name }) => {
          const el = worldSlot.querySelector(`#${code.toLowerCase()}`);
          if (!el) return;
          if (el.tagName === 'g') {
            el.querySelectorAll('path, polygon').forEach(p => {
              p.classList.add('visited');
              p.dataset.country = name;
            });
          } else {
            el.classList.add('visited');
            el.dataset.country = name;
          }
        });

        setupTooltipListeners(worldSlot, '[data-country]', h => h.dataset.country);
      });

    // ROUTINE 2: Initialize and Render Interactive Scoped USA States Map Graphic
    const usaSlot = document.getElementById('usa-map-slot');
    fetch('usa-states-map.svg')
      .then(r => r.text())
      .then(svg => {
        usaSlot.innerHTML = svg;
        
        states.forEach(({ code, name }) => {
          // Select path items matching Wikimedia standard class targets vectors shapes
          const elements = usaSlot.querySelectorAll(`.${code.toLowerCase()}`);
          elements.forEach(el => {
            el.classList.add('visited');
            el.dataset.state = name;
          });
        });

        setupTooltipListeners(usaSlot, '[data-state]', h => `USA - ${h.dataset.state}`);
      });

    // Unified tooltips event bounding coordinator pipeline loop listener handles matrix
    function setupTooltipListeners(container, selector, labelExtractor) {
      container.addEventListener('mousemove', e => {
        const target = e.target.closest(selector);
        if (target && target.classList.contains('visited')) {
          tooltip.textContent = labelExtractor(target);
          tooltip.classList.add('visible');
          tooltip.style.left = e.clientX + 12 + 'px';
          tooltip.style.top = e.clientY - 28 + 'px';
        } else {
          tooltip.classList.remove('visible');
        }
      });
      container.addEventListener('mouseleave', () => {
        tooltip.classList.remove('visible');
      });
    }
  </script>
</body>
</html>
