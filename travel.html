<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel – Clemens JS Schaefer</title>
  <link rel="stylesheet" href="style.css?v=1" />
  <style>
    .map-wrap {
      margin-top: 32px;
      position: relative;
      width: 100vw;
      left: 50%;
      right: 50%;
      margin-left: -50vw;
      margin-right: -50vw;
      background: #ffffff;
      border-top: 1px solid #f1f1ef;
      border-bottom: 1px solid #f1f1ef;
      padding: 12px 0;
    }
    .map-container {
      width: 100%;
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 24px;
      box-sizing: border-box;
      position: relative;
    }
    /* Widescreen horizontal fluid travel vector banner panel framework layout sizing metrics attributes */
    .map-container svg {
      width: 100%;
      height: auto;
      display: block;
      background: #ffffff;
    }

    .map-tooltip {
      position: fixed;
      pointer-events: none;
      background: #37352f;
      color: #fff;
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.1s ease;
      z-index: 50;
      white-space: nowrap;
    }
    .map-tooltip.visible { opacity: 1; }

    .travel-stat {
      margin-top: 32px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .travel-stat .num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.5rem;
      font-weight: 500;
      line-height: 1;
      color: #37352f;
    }
    .travel-stat .label {
      font-size: 0.8125rem;
      color: #b4b4b0;
    }

    .country-section { margin-top: 40px; }
    .country-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    .country-grid span {
      font-size: 0.875rem;
      color: #55534e;
      padding: 6px 0;
      border-bottom: 1px solid #f1f1ef;
    }
    .country-grid span:nth-child(odd) { padding-right: 12px; }
    .country-grid span:nth-child(even) { padding-left: 12px; }
    .country-grid span:hover { color: #37352f; }
  </style>
</head>
<body>
  <script src="nav.js"></script>

  <h1>Travel</h1>

  <!-- View breakout full browser viewport space width decorative breakout panel container wrap grid canvas -->
  <div class="map-wrap">
    <div class="map-container" id="map"></div>
    <div class="map-tooltip" id="tooltip"></div>
  </div>

  <!-- Countries WidgetWidget statistical widgets checklist widgets flat matrices lists spans grid columns rows -->
  <div class="travel-stat" id="stat"></div>
  <section class="country-section" style="margin-top: 20px;">
    <div class="country-grid" id="countries"></div>
  </section>

  <!-- US States WidgetWidget statistical widgets checklist widgets flat matrices lists spans grid columns rows -->
  <div class="travel-stat" id="us-stat" style="margin-top: 32px;"></div>
  <section class="country-section" style="margin-top: 20px;">
    <div class="country-grid" id="states-list"></div>
  </section>

  <script>
    // Global travel logs summaries parameters database records index sets items metrics values configuration
    const visited = [
      { name: 'Germany', code: 'de', year: 1994 },
      { name: 'Iceland', code: 'is', year: 2007 },
      { name: 'Austria', code: 'at', year: 2008 },
      { name: 'Ireland', code: 'ie', year: 2010 },
      { name: 'Norway', code: 'no', year: 2009 },
      { name: 'Denmark', code: 'dk', year: 2024 },
      { name: 'Italy', code: 'it', year: 2016 },
      { name: 'Peru', code: 'pe', year: 2011 },
      { name: 'Colombia', code: 'co', year: 2016 },
      { name: 'Ecuador', code: 'ec', year: 2016 },
      { name: 'Panama', code: 'pa', year: 2017 },
      { name: 'Costa Rica', code: 'cr', year: 2014 },
      { name: 'India', code: 'in', year: 2014 },
      { name: 'Israel', code: 'il', year: 2013 },
      { name: 'France', code: 'fr', year: 2006 },
      { name: 'Spain', code: 'es', year: 2013 },
      { name: 'Cyprus', code: 'cy', year: 2012 },
      { name: 'United Kingdom', code: 'gb', year: 2012 },
      { name: 'China', code: 'cn', year: 2026 },
      { name: 'Japan', code: 'jp', year: 2026 },
      { name: 'Poland', code: 'pl', year: 2009 },
      { name: 'Czech Republic', code: 'cz', year: 2012 },
      { name: 'Mexico', code: 'mx', year: 2025 },
      { name: 'United States', code: 'us', year: 2016 },
      { name: 'Liechtenstein', code: 'li', year: 2013 },
      { name: 'Switzerland', code: 'ch', year: 2013 },
      { name: 'Netherlands', code: 'nl', year: 2017 },
      { name: 'Portugal', code: 'pt', year: 2019 },
      { name: 'Croatia', code: 'hr', year: 2011 },
      { name: 'Puerto Rico', code: 'pr', year: 2022 }
    ];

    // Visited domestic United States sub national state codes breakdown parameters records indices matches
    const visitedStates = [
      { name: 'Florida', code: 'fl', year: 2016 },
      { name: 'Illinois', code: 'il', year: 2018 },
      { name: 'Indiana', code: 'in', year: 2018 },
      { name: 'Michigan', code: 'mi', year: 2018 },
      { name: 'Ohio', code: 'oh', year: 2020 },
      { name: 'New York', code: 'ny', year: 2020 },
      { name: 'California', code: 'ca', year: 2022 },
      { name: 'Nevada', code: 'nv', year: 2022 },
      { name: 'Utah', code: 'ut', year: 2022 },
      { name: 'Arizona', code: 'az', year: 2022 },
      { name: 'Wyoming', code: 'wy', year: 2022 },
      { name: 'Colorado', code: 'co', year: 2022 },
      { name: 'Nebraska', code: 'ne', year: 2022 },
      { name: 'Iowa', code: 'ia', year: 2022 },
      { name: 'Texas', code: 'tx', year: 2023 },
      { name: 'Hawaii', code: 'hi', year: 2024 }
    ];

    // Alpha sort checklists structures blocks records entries variables settings matching preferences 
    visited.sort((a, b) => a.name.localeCompare(b.name));
    visitedStates.sort((a, b) => a.name.localeCompare(b.name));

    // Populate number count counters badges widgets templates labels nodes 
    document.getElementById('stat').innerHTML =
      `<span class="num">${visited.length}</span><span class="label">countries visited</span>`;
    document.getElementById('us-stat').innerHTML =
      `<span class="num">${visitedStates.length}</span><span class="label">US states visited</span>`;

    // Populate layout columns row items text grids parameters elements spans 
    document.getElementById('countries').innerHTML = visited
      .map(c => `<span>${c.name} (${c.year})</span>`).join('');
    document.getElementById('states-list').innerHTML = visitedStates
      .map(s => `<span>${s.name} (${s.year})</span>`).join('');

    const mapContainer = document.getElementById('map');

    // Pull vectors elements charts definitions definitions cleanly from uniquely routed cache busted file path resource string
    fetch('world-map-subdivisions-v1.svg?v=' + new Date().getTime())
      .then(r => r.text())
      .then(svg => {
        mapContainer.innerHTML = svg;
        const tip = document.getElementById('tooltip');
        
        const svgEl = mapContainer.querySelector('svg');
        if (svgEl) {
          // Cleanly slice away rigid sizing attributes parameters variables constraints from structural tag properties nodes
          svgEl.removeAttribute('width');
          svgEl.removeAttribute('height');
          svgEl.removeAttribute('fill');
          
          // THE PERFECT SPACE SCALE CROP VIEWBOX: Vertical range parameters explicitly locked down to Y Span 1220 
          // to ensure the complete South American landmass continent contour profile draws beautifully complete, uncropped 
          // and spacious large wide, while keeping Antarctica masked away below the viewport boundary grid layers lines!
          svgEl.setAttribute('viewBox', '140 40 2410 1220');
          svgEl.setAttribute('preserveAspectRatio', 'xMidYMid slice');
          
          // Inject high priority master style string sheet overriding default vector drawing properties variables definitions
          let embeddedStyle = svgEl.querySelector('#style_css_sheet') || svgEl.querySelector('style');
          if (!embeddedStyle) {
            embeddedStyle = document.createElementNS("http://www.w3.org/2000/svg", "style");
            embeddedStyle.id = "style_css_sheet";
            svgEl.insertBefore(embeddedStyle, svgEl.firstChild);
          }
          
          embeddedStyle.textContent = `
            /* Pristine default soft off-white background fill color and sharp uniform clean white shapes outlines contours separations globally */
            path, polygon, circle {
              fill: #f4f4f2 !important;
              stroke: #ffffff !important;
              stroke-width: 0.5px !important;
            }
            /* Transparent sea overlay filters parameter settings matching styles specifications layout requirements */
            .oceanxx, #ocean, rect[fill="#ffffff"] {
              fill: #ffffff !important;
              stroke: none !important;
            }
            /* Completely suppress floating circle metadata shapes layers labels elements trees placeholders vectors */
            .circlexx, .subxx, .unxx, .noxx {
              display: none !important;
              opacity: 0 !important;
            }
            /* Resilient high specificity visited international country color shading fill deep dark charcoal parameters variables */
            .visited, path.visited, polygon.visited {
              fill: #37352f !important;
              stroke: #ffffff !important;
              stroke-width: 0.8px !important;
            }
            
            /* THE IRONCLAD COMPUND DOUBLE-SELECTOR SHADING overrides list MATRIX: Hardcoding an absolute 
               comprehensive selector overrides block covering BOTH lowercased id vector strings labels 
               (#us-ca) AND alternative upper/lowercase custom dataset properties attributes selectors 
               ([data-id="CA"]) simultaneously to guarantee absolute flawless highlightsvisibility dominance 
               across all cross platform runtime browser engines universally live! */
            #us-fl, #us-il, #us-in, #us-mi, #us-oh, #us-ny, #us-ca, #us-nv, #us-ut, #us-az, #us-wy, #us-co, #us-ne, #us-ia, #us-tx, #us-hi,
            [data-id="FL"], [data-id="fl"], [data-id="IL"], [data-id="il"], [data-id="IN"], [data-id="in"], [data-id="MI"], [data-id="mi"], [data-id="OH"], [data-id="oh"], [data-id="NY"], [data-id="ny"], [data-id="CA"], [data-id="ca"], [data-id="NV"], [data-id="nv"], [data-id="UT"], [data-id="ut"], [data-id="AZ"], [data-id="az"], [data-id="WY"], [data-id="wy"], [data-id="CO"], [data-id="co"], [data-id="NE"], [data-id="ne"], [data-id="IA"], [data-id="ia"], [data-id="TX"], [data-id="tx"], [data-id="HI"], [data-id="hi"] {
              fill: #37352f !important;
              stroke: #ffffff !important;
              stroke-width: 0.8px !important;
            }
            
            /* Keep polarcap masked cleanly away bounds limits display space path */
            #AQ, .aq, [id="us-aq"], [id="aq"] {
              display: none !important;
              opacity: 0 !important;
            }
          `;
        }

        // 1. Paint Visited International Countries (strictly skipping collective USA parent group entries strings maps loops)
        visited.forEach(({ code, name }) => {
          const cleanCode = code.toLowerCase().trim();
          if (cleanCode === 'us' || cleanCode === 'usa') return;
          
          const elements = mapContainer.querySelectorAll(`#${cleanCode}, .${cleanCode}`);
          elements.forEach(el => {
            if (el.tagName === 'g') {
              el.querySelectorAll('path, polygon').forEach(p => {
                p.classList.add('visited');
                p.style.setProperty('fill', '#37352f', 'important');
                p.dataset.label = name;
              });
            } else {
              el.classList.add('visited');
              el.style.setProperty('fill', '#37352f', 'important');
              el.dataset.label = name;
            }
          });
        });

        // 2. Paint Granular Visited domestic United States sub states outline path layers nodes references natively
        visitedStates.forEach(({ code, name }) => {
          const cleanCode = code.toLowerCase().trim();
          const permutations = [
            `#us-${cleanCode}`,
            `[data-id="${cleanCode.toUpperCase()}"]`,
            `[data-id="${cleanCode}"]`,
            `#US-${cleanCode.toUpperCase()}`,
            `#${cleanCode}`,
            `#${cleanCode.toUpperCase()}`,
            `[id$="-${cleanCode}"]`
          ];
          
          let el = null;
          for (const selector of permutations) {
            el = mapContainer.querySelector(selector);
            if (el) break;
          }
          
          if (el) {
            el.classList.add('visited');
            el.style.setProperty('fill', '#37352f', 'important');
            el.dataset.label = `USA - ${name}`;
            
            if (el.tagName === 'g') {
              el.querySelectorAll('path, polygon').forEach(p => {
                p.classList.add('visited');
                p.style.setProperty('fill', '#37352f', 'important');
                p.dataset.label = `USA - ${name}`;
              });
            }
          }
        });

        // DynamicPointer context tooltips interactive scanner coordinates overlay listener perfect loop routines strings
        mapContainer.addEventListener('mousemove', e => {
          let target = e.target.closest('.visited');
          
          // Fallback text token selector attribute query scanner checking routines 
          if (!target && e.target.id) {
            const idL = e.target.id.toLowerCase();
            if (idL.startsWith('us-')) {
              const code = idL.replace('us-', '');
              if (visitedStates.some(s => s.code === code)) {
                target = e.target;
              }
            }
          }
          if (!target && e.target.getAttribute && e.target.getAttribute('data-id')) {
            const dId = e.target.getAttribute('data-id').toLowerCase();
            if (visitedStates.some(s => s.code === dId)) {
              target = e.target;
            }
          }

          if (target) {
            if (target.dataset.label) {
              tip.textContent = target.dataset.label;
            } else {
              const codeStr = (target.id ? target.id.toLowerCase().replace('us-', '') : '') || 
                              (target.getAttribute('data-id') || '').toLowerCase();
              const matchedState = visitedStates.find(s => s.code === codeStr);
              if (matchedState) {
                tip.textContent = `USA - ${matchedState.name}`;
                target.dataset.label = `USA - ${matchedState.name}`;
              }
            }
            tip.classList.add('visible');
            tip.style.left = e.clientX + 12 + 'px';
            tip.style.top = e.clientY - 28 + 'px';
          } else {
            tip.classList.remove('visible');
          }
        });

        mapContainer.addEventListener('mouseleave', () => {
          tip.classList.remove('visible');
        });
      });
  </script>
</body>
</html>
