<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel – Clemens JS Schaefer</title>
  <link rel="stylesheet" href="style.css?v=1" />
  <style>
    /* Large breakout fluid horizonal horizontally wide baner display container configurations */
    .map-wrap {
      margin-top: 32px;
      position: relative;
      width: 100vw;
      left: 50%;
      right: 50%;
      margin-left: -50vw;
      margin-right: -50vw;
      background: #ffffff;
      border-top: 1px solid #f1f1ef;
      border-bottom: 1px solid #f1f1ef;
      padding: 16px 0;
      overflow: hidden;
    }
    .map-container {
      width: 100%;
      max-width: 1040px;
      margin: 0 auto;
      padding: 0 24px;
      box-sizing: border-box;
      position: relative;
    }
    .map-container svg {
      width: 100%;
      height: auto;
      display: block;
      background: #ffffff;
    }

    .map-tooltip {
      position: fixed;
      pointer-events: none;
      background: #37352f;
      color: #fff;
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.1s ease;
      z-index: 100;
      white-space: nowrap;
    }
    .map-tooltip.visible { opacity: 1; }

    .travel-stat {
      margin-top: 40px;
      display: flex;
      align-items: baseline;
      gap: 8px;
      border-bottom: 2px solid #f1f1ef;
      padding-bottom: 6px;
    }
    .travel-stat .num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.5rem;
      font-weight: 500;
      line-height: 1;
      color: #37352f;
    }
    .travel-stat .label {
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #b4b4b0;
    }

    .country-section { margin-top: 16px; }
    .country-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    .country-grid span {
      font-size: 0.875rem;
      color: #55534e;
      padding: 6px 0;
      border-bottom: 1px solid #f1f1ef;
    }
    .country-grid span:nth-child(odd) { padding-right: 12px; }
    .country-grid span:nth-child(even) { padding-left: 12px; }
    .country-grid span:hover { color: #37352f; }
  </style>
</head>
<body>
  <script src="nav.js"></script>

  <h1>Travel</h1>

  <!-- MASTER UNIFIED VERTEX CANVASBreakout full width horizonal container layout -->
  <div class="map-wrap">
    <div class="map-container" id="master-map-slot"></div>
    <div class="map-tooltip" id="master-tooltip"></div>
  </div>

  <!-- TEXT BREAKDOWN SECTION 1: COUNTRIES VISITED -->
  <div class="travel-stat">
    <span class="num" id="countries-counter">0</span>
    <span class="label">Countries Visited</span>
  </div>
  <section class="country-section">
    <div class="country-grid" id="countries-list-slot"></div>
  </section>

  <!-- TEXT BREAKDOWN SECTION 2: US STATES VISITED -->
  <div class="travel-stat" style="margin-top: 48px;">
    <span class="num" id="states-counter">0</span>
    <span class="label">US States Visited</span>
  </div>
  <section class="country-section">
    <div class="country-grid" id="states-list-slot"></div>
  </section>

  <script>
    // Reconciled True International Countries Dataset (Includes unified United States 2016 entry node)
    const visitedCountries = [
      { name: 'Germany', code: 'de', year: 1994 },
      { name: 'Iceland', code: 'is', year: 2007 },
      { name: 'Austria', code: 'at', year: 2008 },
      { name: 'Ireland', code: 'ie', year: 2010 },
      { name: 'Norway', code: 'no', year: 2009 },
      { name: 'Denmark', code: 'dk', year: 2024 },
      { name: 'Italy', code: 'it', year: 2016 },
      { name: 'Peru', code: 'pe', year: 2011 },
      { name: 'Colombia', code: 'co', year: 2016 },
      { name: 'Ecuador', code: 'ec', year: 2016 },
      { name: 'Panama', code: 'pa', year: 2017 },
      { name: 'Costa Rica', code: 'cr', year: 2014 },
      { name: 'India', code: 'in', year: 2014 },
      { name: 'Israel', code: 'il', year: 2013 },
      { name: 'France', code: 'fr', year: 2006 },
      { name: 'Spain', code: 'es', year: 2013 },
      { name: 'Cyprus', code: 'cy', year: 2012 },
      { name: 'United Kingdom', code: 'gb', year: 2012 },
      { name: 'China', code: 'cn', year: 2026 },
      { name: 'Japan', code: 'jp', year: 2026 },
      { name: 'Poland', code: 'pl', year: 2009 },
      { name: 'Czech Republic', code: 'cz', year: 2012 },
      { name: 'Mexico', code: 'mx', year: 2025 },
      { name: 'United States', code: 'us', year: 2016 },
      { name: 'Liechtenstein', code: 'li', year: 2013 },
      { name: 'Switzerland', code: 'ch', year: 2013 },
      { name: 'Netherlands', code: 'nl', year: 2017 },
      { name: 'Portugal', code: 'pt', year: 2019 },
      { name: 'Croatia', code: 'hr', year: 2011 },
      { name: 'Puerto Rico', code: 'pr', year: 2022 }
    ];

    // Granular sub national US states tracking logs dataset parameters list array
    const visitedStates = [
      { name: 'Florida', code: 'fl', year: 2016 },
      { name: 'Illinois', code: 'il', year: 2018 },
      { name: 'Indiana', code: 'in', year: 2018 },
      { name: 'Michigan', code: 'mi', year: 2018 },
      { name: 'Ohio', code: 'oh', year: 2020 },
      { name: 'New York', code: 'ny', year: 2020 },
      { name: 'California', code: 'ca', year: 2022 },
      { name: 'Nevada', code: 'nv', year: 2022 },
      { name: 'Utah', code: 'ut', year: 2022 },
      { name: 'Arizona', code: 'az', year: 2022 },
      { name: 'Wyoming', code: 'wy', year: 2022 },
      { name: 'Colorado', code: 'co', year: 2022 },
      { name: 'Nebraska', code: 'ne', year: 2022 },
      { name: 'Iowa', code: 'ia', year: 2022 },
      { name: 'Texas', code: 'tx', year: 2023 },
      { name: 'Hawaii', code: 'hi', year: 2024 }
    ];

    // Alphabetize lists formatting structures grids inputs panels 
    visitedCountries.sort((a, b) => a.name.localeCompare(b.name));
    visitedStates.sort((a, b) => a.name.localeCompare(b.name));

    // Update display number indicators text slots metrics 
    document.getElementById('countries-counter').textContent = visitedCountries.length;
    document.getElementById('states-counter').textContent = visitedStates.length;

    // Render alphabetic listings grids column slots templates strings
    document.getElementById('countries-list-slot').innerHTML = visitedCountries
      .map(c => `<span>${c.name} (${c.year})</span>`).join('');
    document.getElementById('states-list-slot').innerHTML = visitedStates
      .map(s => `<span>${s.name} (${s.year})</span>`).join('');

    const mapSlot = document.getElementById('master-map-slot');
    const tooltip = document.getElementById('master-tooltip');

    // Load the master subdivisions integrated map file asset 
    fetch('world-map-subdivisions-v1.svg')
      .then(r => r.text())
      .then(svg => {
        mapSlot.innerHTML = svg;
        
        const svgEl = mapSlot.querySelector('svg');
        if (svgEl) {
          // Strip dimension strict locks cleanly from headers parameters
          svgEl.removeAttribute('width');
          svgEl.removeAttribute('height');
          svgEl.removeAttribute('fill');
          
          // Definitive Robinson horizontally centered breakout wide projection coordinates Viewbox configurations
          svgEl.setAttribute('viewBox', '82 45 2528 1140');
          svgEl.setAttribute('preserveAspectRatio', 'xMidYMid meet');
          
          // Inject supreme dynamic override stylesheet rules into map frame
          let customStyle = svgEl.querySelector('style');
          if (!customStyle) {
            customStyle = document.createElementNS("http://www.w3.org/2000/svg", "style");
            svgEl.insertBefore(customStyle, svgEl.firstChild);
          }
          
          customStyle.textContent = `
            /* Set unvisited land paths to a beautifully balanced soft gray background */
            path, polygon, circle {
              fill: #eaeaea;
              stroke: #ffffff;
              stroke-width: 0.4px;
            }
            /* FORCE OCEANS COMPLETELY WHITE TO MATCH SITE BACKGROUND (No border lines) */
            .oceanxx, #ocean, path[class="oceanxx"], #svg2985 #ocean {
              fill: #ffffff !important;
              stroke: none !important;
            }
            /* Hide cap metadata tags nodes boundaries frames completely out from render chains */
            .circlexx, .subxx, .unxx, .noxx, #AQ, .aq {
              display: none !important;
              opacity: 0 !important;
            }
            /* Visited premium dark charcoal highlights overrides configurations live priority presets values */
            .shaded-visited {
              fill: #37352f !important;
              stroke: #ffffff !important;
              stroke-width: 0.6px !important;
            }
          `;
        }

        // 1. Highlight Reconciled Visited International Countries (Skips generic USA node to prevent full blind fill)
        visitedCountries.forEach(({ code, name }) => {
          const lowCode = code.toLowerCase().trim();
          if (lowCode === 'us' || lowCode === 'usa') return;
          
          const nodes = mapSlot.querySelectorAll(`#${lowCode}, .${lowCode}`);
          nodes.forEach(n => {
            if (n.tagName === 'g') {
              n.querySelectorAll('path, polygon').forEach(p => {
                p.classList.add('shaded-visited');
                p.style.setProperty('fill', '#37352f', 'important');
                p.dataset.label = name;
              });
            } else {
              n.classList.add('shaded-visited');
              n.style.setProperty('fill', '#37352f', 'important');
              n.dataset.label = name;
            }
          });
        });

        // 2. Highlight Integrated Granular Domestic United States Subdivisions States paths directly inside world view canvas!
        visitedStates.forEach(({ code, name }) => {
          const lowCode = code.toLowerCase().trim();
          // Wikipedia/Wikimedia master subdivisions configuration path pattern ID handles target lookup matrix
          const stateEl = mapSlot.querySelector(`#us-${lowCode}`);
          if (stateEl) {
            stateEl.classList.add('shaded-visited');
            stateEl.style.setProperty('fill', '#37352f', 'important');
            stateEl.dataset.label = `USA - ${name}`;
            if (stateEl.tagName === 'g') {
              stateEl.querySelectorAll('path, polygon').forEach(p => {
                p.classList.add('shaded-visited');
                p.style.setProperty('fill', '#37352f', 'important');
                p.dataset.label = `USA - ${name}`;
              });
            }
          } else {
            // Fallback class selector checker strings matches
            const fallbackNodes = mapSlot.querySelectorAll(`.us-${lowCode}, [class*="us-${lowCode}"]`);
            fallbackNodes.forEach(fn => {
              fn.classList.add('shaded-visited');
              fn.style.setProperty('fill', '#37352f', 'important');
              fn.dataset.label = `USA - ${name}`;
            });
          }
        });

        // 3. Scoped Post-Processing Cleanup Matrix: Strip highlights off from explicit request exclusion shapes cells
        const exclusions = ['gf', 'path6656', 'path6658', 'path6718', 'path6788', 'path6606', 'path6608', 'path6614', 'path6616', 'path6618', 'path6624', 'path6626', 'path6628', 'path6630', 'path6632', 'path6634', 'path6636', 'path6638', 'path6642', 'path6644', 'path6648', 'path6650', 'path6652', 'path6656', 'path6658', 'path6662', 'path6664', 'path6666', 'path6668', 'path6670', 'path6672', 'path6674', 'path6682', 'path6684', 'path6686', 'path6688', 'path6690', 'path6692', 'path6694', 'path6696', 'path6698', 'path6700', 'path6702', 'path6704', 'path6706', 'path6708', 'path6710', 'path6712', 'path6714', 'path6716', 'path6718', 'path6720', 'path6722', 'path6724', 'path6726', 'path6728', 'path6730', 'path6732', 'path6734', 'path6736', 'path6738', 'path6740', 'path6742', 'path6746', 'path6748', 'path6750', 'path6752', 'path6756', 'path6758', 'path6760', 'path6762', 'path6764', 'path6770', 'path6772', 'path6774', 'path6776', 'path6778'];
        exclusions.forEach(id => {
          const node = mapSlot.querySelector('#' + id);
          if (node) {
            node.classList.remove('shaded-visited');
            node.style.setProperty('fill', '#eaeaea', 'important');
            node.removeAttribute('data-label');
          }
        });

        // Initialize interactive tracker listeners tools overlay hover definitions routines positions matrix pointer tracking handlers
        mapSlot.addEventListener('mousemove', e => {
          const target = e.target.closest('.shaded-visited');
          if (target && target.dataset.label) {
            tooltip.textContent = target.dataset.label;
            tooltip.classList.add('visible');
            tooltip.style.left = e.clientX + 12 + 'px';
            tooltip.style.top = e.clientY - 28 + 'px';
          } else {
            tooltip.classList.remove('visible');
          }
        });
        mapSlot.addEventListener('mouseleave', () => {
          tooltip.classList.remove('visible');
        });
      });
  </script>
</body>
</html>
